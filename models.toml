# Resolver manifest — names, hashes, sizes, and licences for every
# neural model whose lifecycle is resolver-managed.
#
# Not every neural model the runtime uses lives here. HTDemucs ONNX is
# fetched and verified by `crates/neural-pitch-core/src/stems/` from the
# pinned URL/SHA-256 constants in that module, outside the resolver
# manifest contract.
#
# This file is git-tracked. The resolved ONNX blobs are cached under the
# platform app-data directory and are not committed.
#
# `schema_version = 1` is the parser's exact-match guard; bumping it is a
# breaking change that triggers a "manifest version unsupported" error
# rather than silent reinterpretation.
schema_version = 1

# Spotify Basic Pitch v1 (ICASSP 2022). Bundled in-tree under
# `crates/neural-pitch-core/assets/basic_pitch_v1.0.onnx`; the resolver
# treats `bundled = true` as already-resolved and never hits the network.
[[models]]
name        = "basic-pitch-v1"
url         = "https://github.com/spotify/basic-pitch/raw/main/basic_pitch/saved_models/icassp_2022/nmp.onnx"
sha256      = "2c3c1d144bfa61ad236e92e169c13535c880469a12a047d4e73451f2c059a0ec"
size_bytes  = 230_444
license     = "Apache-2.0"
bundled     = true
