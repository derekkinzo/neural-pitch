default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: "tsconfig.*\\.json|.vscode/.*\\.json"
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: clippy
        args: ["--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]
  - repo: local
    hooks:
      # Run prettier from our pinned npm devDependency rather than the
      # mirrors-prettier image so the hook always matches CI's `npm run
      # format -- --check`. The mirror lagged behind our prettier version
      # in Phase 1.2 and produced a different formatting decision on
      # generic-constrained interfaces.
      - id: prettier
        name: prettier
        language: system
        entry: npx prettier --write
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css]
        exclude: "docs/research/.*\\.md"
      - id: eslint
        name: eslint
        language: system
        entry: npm run lint --silent --
        types_or: [ts, tsx]
        pass_filenames: false
      - id: typecheck
        name: tsc --noEmit
        language: system
        entry: npm run typecheck --silent
        types_or: [ts, tsx]
        pass_filenames: false
      - id: commit-msg-format
        name: commit-msg-format
        language: script
        entry: scripts/check-commit-msg.sh
        stages: [commit-msg]
        always_run: true
