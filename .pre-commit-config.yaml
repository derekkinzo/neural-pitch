default_install_hook_types: [pre-commit, commit-msg, pre-push]
default_stages: [pre-commit]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: "tsconfig.*\\.json|.vscode/.*\\.json"
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: clippy
        args: ["--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]
  - repo: local
    hooks:
      # Run prettier from our pinned npm devDependency rather than the
      # mirrors-prettier image so the hook always matches CI's `npm run
      # format -- --check`.
      - id: prettier
        name: prettier
        language: system
        entry: npx prettier --write
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css]
      - id: eslint
        name: eslint
        language: system
        entry: npm run lint --silent --
        types_or: [ts, tsx]
        pass_filenames: false
      - id: typecheck
        name: tsc --noEmit
        language: system
        entry: npm run typecheck --silent
        types_or: [ts, tsx]
        pass_filenames: false
      - id: commit-msg-format
        name: commit-msg-format
        language: script
        entry: scripts/check-commit-msg.sh
        stages: [commit-msg]
        always_run: true
      # Pre-push gate: runs the three-tier local-CI harness's `quick` tier
      # before any push reaches the remote. ZERO warnings, ZERO errors,
      # both --all-features AND --no-default-features clean. The gate
      # exists so red CI is impossible. `git push --no-verify` is the only
      # bypass — for genuine emergencies only; CI will catch you anyway.
      - id: ci-local-quick
        name: ci-local quick (pre-push gate)
        entry: scripts/ci-local.sh quick
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
        verbose: true
