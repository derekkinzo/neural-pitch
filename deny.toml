[advisories]
yanked = "warn"
ignore = [
  # rust-unic crate family is unmaintained; pulled in transitively by Tauri's
  # tauri-utils -> urlpattern -> unic-ucd-ident. No safe upgrade available
  # and no alternative crate path. Revisit when Tauri or urlpattern migrates
  # to icu4x or unicode-rs. Tracking: https://github.com/rustsec/advisory-db/issues/2414
  "RUSTSEC-2025-0098",
]

[licenses]
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "Zlib",
  "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
