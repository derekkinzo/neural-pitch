[advisories]
# cargo-deny v2 / v0.19+ schema:
# Vulnerabilities and yanked crates are gated by `version` (set globally
# on `[advisories]` is deprecated; ids are auto-evaluated and reported).
# `unmaintained` accepts "all" | "workspace" | "transitive" | "none".
# Set to "workspace" so unmaintained warnings only fail CI when we own
# the dep directly. Tauri's huge transitive set of unmaintained gtk-rs
# crates becomes an informational note instead of a blocker.
unmaintained = "workspace"
yanked = "warn"
ignore = []

[licenses]
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "Zlib",
  "CC0-1.0",
  "Unlicense",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
