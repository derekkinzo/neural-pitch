[advisories]
# Vulnerabilities are hard errors and must be addressed.
vulnerability = "deny"
# Unmaintained advisories are informational. The Tauri / cpal / audio
# crate chains pull in many transitively-unmaintained crates (gtk-rs GTK3
# bindings, rust-unic, paste, derivative, etc.) that we cannot upgrade
# without Tauri's upstream migrating first. Surface them as warnings so
# we see them, but do not fail CI on something we cannot fix.
unmaintained = "warn"
unsound       = "deny"
notice        = "warn"
yanked        = "warn"
ignore        = []

[licenses]
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "Zlib",
  "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
