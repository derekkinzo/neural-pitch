name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  commit-lint:
    name: commit-lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/check-commit-msg.sh
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          commits=$(git rev-list "${base}..${head}")
          if [ -z "${commits}" ]; then
            echo "No commits to validate."
            exit 0
          fi
          fail=0
          for sha in ${commits}; do
            echo "::group::Validating ${sha}"
            tmp=$(mktemp)
            git log -1 --format=%B "${sha}" > "${tmp}"
            if ! scripts/check-commit-msg.sh "${tmp}"; then
              echo "::error::Commit ${sha} failed commit-message validation"
              fail=1
            fi
            rm -f "${tmp}"
            echo "::endgroup::"
          done
          exit "${fail}"

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: npm format check
        run: npm run format -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev pkg-config libasound2-dev
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Build frontend (Tauri requires dist/ for generate_context!)
        run: npm run build
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  clippy-no-default-features:
    name: clippy (no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev pkg-config libasound2-dev
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Build frontend (Tauri requires dist/ for generate_context!)
        run: npm run build
      - uses: Swatinem/rust-cache@v2
      # no-default-features hygiene: guards against accidental
      # unconditional `ort`/`ndarray`/`rubato` imports. Core crate only —
      # `src-tauri` requires `cpal`/`flac`/`pyin` for its IPC commands.
      - name: cargo build --no-default-features (core)
        run: cargo build -p neural-pitch-core --no-default-features
      - name: cargo clippy --no-default-features (core)
        run: cargo clippy -p neural-pitch-core --all-targets --no-default-features -- -D warnings

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: npm typecheck
        run: npm run typecheck
      - name: tsc -p tests/e2e
        run: npx tsc -p tests/e2e/tsconfig.json

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: npm run lint
        run: npm run lint

  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    env:
      # RUSTUP_TOOLCHAIN env wins over rust-toolchain.toml.
      RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Install Tauri Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev pkg-config libasound2-dev
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Build frontend (Tauri requires dist/ for generate_context!)
        run: npm run build
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.toolchain }}
      - name: cargo test
        run: cargo test --workspace --all-features

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev pkg-config libasound2-dev
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Build frontend (Tauri requires dist/ for generate_context!)
        run: npm run build
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --workspace

  voice-acceptance:
    # Aggregate >= 0.95 voice acceptance floor — release gate, runs the
    # same harness the local pre-push gate does. CI is authoritative
    # here; the local step is a fast-fail mirror so contributors discover
    # regressions before push, not after.
    name: voice-acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install ALSA + Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Run acceptance harness
        run: bash scripts/run-acceptance.sh

  e2e-mock:
    name: e2e-mock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Run Playwright E2E (Chromium + WebKit)
        run: npx playwright test --project=chromium --project=webkit
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  no-leak:
    # Fail if any tracked file contains an internal-only reference or a
    # personal-machine path. The local pre-push gate (scripts/ci-local.sh)
    # runs the same check, but a contributor who pushes with --no-verify
    # (or a fork PR with hooks not installed) would otherwise bypass it;
    # CI is authoritative.
    name: no-leak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: no-leak grep
        shell: bash
        run: |
          set -euo pipefail
          # The pattern below intentionally contains the very
          # substrings it forbids; tag this script and the harness
          # with the literal sentinel `# no-leak: regex-source` and
          # filter those tagged lines out of the input.
          PATTERN='amazon|amzn|asbx|midway|brazil|claude|/home/ANT' # no-leak: regex-source
          # Singer-positioning preflight. The repo is a general-purpose
          # pitch-detection app for musicians. The forbidden phrases
          # appearing in marketing or copy would re-introduce the
          # singer-specific framing that was explicitly dropped.
          # no-leak: regex-source. 'sight-singing' is an ear-training drill ID — allowlisted under training/ sub-trees.
          SINGER_PATTERN='for singers|sight-singing|app for singers' # no-leak: regex-source
          # Path allowlist for ear-training drill code — must
          # be precise; do NOT blanket-exclude src/components/.
          TRAINING_ALLOWLIST='^crates/neural-pitch-core/src/training/|^src-tauri/src/commands_drill\.rs$|^src-tauri/tests/(drill_history_persists|match_channel_emits)\.rs$|^src/components/training/|^src/hooks/useDrillMatchStream\.ts$|^src/lib/drill-synth\.ts$|^src/stores/trainingStore\.ts$|^src/types/training\.ts$|^tests/e2e/[a-z0-9_]*(training|karaoke|sight_singing|interval_drill|chord_drill|scale_drill|solfege)[a-z0-9_]*\.spec\.ts$|^tests/e2e/helpers/tauri-mock\.ts$'
          hits="$(git ls-files \
            | xargs grep -InE "${PATTERN}" 2>/dev/null \
            | grep -vE '# no-leak: regex-source' \
            | cut -d: -f1 \
            | sort -u || true)"
          singer_hits="$(git ls-files \
            | xargs grep -InE "${SINGER_PATTERN}" 2>/dev/null \
            | grep -vE '# no-leak: regex-source' \
            | cut -d: -f1 \
            | grep -vE "${TRAINING_ALLOWLIST}" \
            | sort -u || true)"
          if [ -n "${hits}" ] || [ -n "${singer_hits}" ]; then
            echo "::error::no-leak grep found forbidden references in:"
            [ -n "${hits}" ] && echo "${hits}"
            [ -n "${singer_hits}" ] && echo "${singer_hits}"
            exit 1
          fi
          echo "no-leak: clean"

  smoke-shell:
    # Live-shell smoke harness: builds the real Tauri shell with the
    # `app-neural,neural` feature graph, drives a `tauri-driver`
    # WebDriver session through the 12-step happy path, and verifies
    # the stem-separate step against the pinned HTDemucs ONNX. This is
    # a release-gate job — it runs only on `push` to `main` because the
    # warm wall-clock is 5–7 min and the cold path pulls a 316 MB model.
    # Per-PR coverage of the same UI surface lives in `e2e-mock`, which
    # exercises the IPC contract via `tests/e2e/helpers/tauri-mock.ts`.
    #
    # When extending to other OSes (deferred): add a matrix on
    # `os: [ubuntu-latest, macos-latest, windows-latest]` and branch
    # the system-deps install, the model cache path
    # (`~/Library/Application Support/com.derekkinzo.neuralpitch/...`
    # on macOS, `%APPDATA%\com.derekkinzo.neuralpitch\...` on Windows),
    # and the libonnxruntime filename (`.dylib` / `onnxruntime.dll`).
    name: smoke-shell
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # `rust-lld` has crashed on the runner image when linking the
      # `app-neural,neural` feature graph; route through system `lld`
      # to keep the link step deterministic. Falling back to `bfd` is
      # the next escalation if `lld` itself regresses.
      RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (rust-toolchain.toml pin)
        # Pin to the same toolchain rust-toolchain.toml uses so
        # `cargo install tauri-driver --locked` runs under the same
        # rustc the workspace builds with.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy,rustfmt
      - name: Install Tauri Linux deps + smoke prereqs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libasound2-dev pkg-config \
            webkit2gtk-driver xvfb lld \
            pulseaudio
      - name: Start a virtual PulseAudio sink
        # GitHub-hosted runners have no audio card; cpal fails to open
        # the default PCM and the tuner shell lands in `data-state=error`
        # instead of `live`. Spawning a per-user pulseaudio daemon with
        # a `null-sink` gives cpal a default device to enumerate.
        run: |
          set -euo pipefail
          pulseaudio --start --log-target=stderr --exit-idle-time=-1
          # Allow a beat for the daemon socket to bind, then create a
          # null-sink so cpal sees at least one playback device. The
          # input side uses pulseaudio's `default` source which the
          # null-sink registers as a monitor.
          sleep 1
          pactl load-module module-null-sink sink_name=virt-mic
          pactl info | head -5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Build frontend (Tauri requires dist/ for generate_context!)
        run: npm run build
      - uses: Swatinem/rust-cache@v2
        with:
          key: smoke-shell
          # `cache-bin: true` so `cargo install tauri-driver --locked`
          # is restored from `~/.cargo/bin` on warm runs.
          cache-bin: true
      - name: Read pinned HTDemucs SHA-256
        id: htdemucs-sha
        # Source-of-truth is HTDEMUCS_SHA256 in
        # crates/neural-pitch-core/src/stems/mod.rs. Extracting the
        # hex literal here keeps the cache key in lock-step with the
        # constant; editing the constant always changes the key.
        run: |
          set -euo pipefail
          sha="$(grep -oE '[a-f0-9]{64}' crates/neural-pitch-core/src/stems/mod.rs | head -n1)"
          if [ -z "${sha}" ]; then
            echo "::error::could not read HTDEMUCS_SHA256 from stems/mod.rs" >&2
            exit 1
          fi
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
      - name: Cache HTDemucs ONNX (keyed on contract SHA-256)
        id: htdemucs-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/com.derekkinzo.neuralpitch/models/htdemucs.onnx
          key: htdemucs-onnx-${{ steps.htdemucs-sha.outputs.sha }}
      - name: Pre-download HTDemucs ONNX on cache miss
        # Pull and verify the 316 MB model BEFORE the smoke step so a
        # cold cache surfaces as a network failure here rather than
        # blowing the smoke step's wall-clock budget. The pinned URL
        # mirrors HTDEMUCS_MODEL_URL in stems/mod.rs.
        if: steps.htdemucs-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          dest="${HOME}/.local/share/com.derekkinzo.neuralpitch/models/htdemucs.onnx"
          mkdir -p "$(dirname "${dest}")"
          curl -L --fail --retry 3 --retry-delay 5 \
            -o "${dest}" \
            "https://huggingface.co/StemSplitio/htdemucs-onnx/resolve/d54ed9eb60e258ea82131c6ee14578628816456a/htdemucs.onnx"
          actual="$(sha256sum "${dest}" | awk '{print $1}')"
          expected="${{ steps.htdemucs-sha.outputs.sha }}"
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::HTDemucs SHA-256 mismatch: expected ${expected}, got ${actual}" >&2
            rm -f "${dest}"
            exit 1
          fi
          echo "HTDemucs ONNX verified: ${actual}"
      - name: Install tauri-driver
        # --locked uses the tauri-driver crate's own Cargo.lock for
        # reproducible bins; cache-bin in Swatinem/rust-cache restores
        # ~/.cargo/bin on warm runs.
        run: cargo install tauri-driver --locked
      - name: Resolve libonnxruntime via onnxruntime-node
        # Pinned to 1.21.0 to match the local-developer install in
        # scripts/smoke-test.sh. Filters by the host arch sub-dir
        # (`linux/x64/` on the GitHub-hosted ubuntu runner) so we never
        # hand ort an arch-mismatched dylib — picking the wrong arch
        # silently degrades the codepath into a 4-minute hang on Basic
        # Pitch's first call.
        run: |
          set -euo pipefail
          case "$(uname -s)/$(uname -m)" in
            Linux/x86_64)  host_napi="linux/x64" ;;
            Linux/aarch64) host_napi="linux/arm64" ;;
            Darwin/x86_64) host_napi="darwin/x64" ;;
            Darwin/arm64)  host_napi="darwin/arm64" ;;
            *)
              echo "::error::unsupported runner arch: $(uname -s)/$(uname -m)" >&2
              exit 1
              ;;
          esac
          ort_dir="${RUNNER_TEMP}/ort"
          mkdir -p "${ort_dir}"
          npm install --no-save --prefix "${ort_dir}" onnxruntime-node@1.21.0
          ort_so="$(find "${ort_dir}/node_modules/onnxruntime-node" \
            -path "*/${host_napi}/libonnxruntime.so*" | head -n1)"
          if [ -z "${ort_so}" ]; then
            echo "::error::libonnxruntime.so not found under ${ort_dir}/${host_napi}" >&2
            exit 1
          fi
          echo "ORT_DYLIB_PATH=${ort_so}" >> "${GITHUB_ENV}"
      - name: Run smoke harness under Xvfb
        run: xvfb-run -a --server-args="-screen 0 1280x800x24" bash scripts/smoke-test.sh
      - name: Dump smoke logs on failure
        if: failure()
        run: |
          echo "=== summary.jsonl (every step's verdict) ==="
          find .smoke-reports -name 'summary.jsonl' -exec cat {} \; 2>/dev/null || true
          echo
          echo "=== driver.log (smoke-driver.mjs stdout/stderr) ==="
          find .smoke-reports -name 'driver.log' -exec tail -60 {} \; 2>/dev/null || true
          echo
          echo "=== tauri-driver.log ==="
          find .smoke-reports -name 'tauri-driver.log' -exec tail -30 {} \; 2>/dev/null || true
      - name: Upload smoke reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-reports
          # `.smoke-reports/` is a dot-prefixed directory; without
          # `include-hidden-files: true` actions/upload-artifact@v4
          # silently skips it.
          path: .smoke-reports/**/*
          include-hidden-files: true
          retention-days: 14
