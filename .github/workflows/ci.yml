name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  commit-lint:
    name: commit-lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/check-commit-msg.sh
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          commits=$(git rev-list "${base}..${head}")
          if [ -z "${commits}" ]; then
            echo "No commits to validate."
            exit 0
          fi
          fail=0
          for sha in ${commits}; do
            echo "::group::Validating ${sha}"
            tmp=$(mktemp)
            git log -1 --format=%B "${sha}" > "${tmp}"
            if ! scripts/check-commit-msg.sh "${tmp}"; then
              echo "::error::Commit ${sha} failed commit-message validation"
              fail=1
            fi
            rm -f "${tmp}"
            echo "::endgroup::"
          done
          exit "${fail}"

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: npm format check
        run: npm run format -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev pkg-config libasound2-dev
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Build frontend (Tauri requires dist/ for generate_context!)
        run: npm run build
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  clippy-no-default-features:
    name: clippy (no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev pkg-config libasound2-dev
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Build frontend (Tauri requires dist/ for generate_context!)
        run: npm run build
      - uses: Swatinem/rust-cache@v2
      # Phase 2.2 hygiene — guard against feature-gating regressions where
      # a future change forgets to wrap an `ort` / `ndarray` / `rubato`
      # import in `#[cfg(feature = "neural")]` (or removes `optional =
      # true` from one of those deps). Mirrors the reasoning in the
      # `neural` / `pyin` / `flac` opt-in feature design (see core
      # Cargo.toml comments and the `pub fn make_estimator` factory): the
      # minimal build path MUST stay lean for mobile and minimal-CI
      # deployments. Run only the core crate here — `src-tauri` requires
      # `cpal`/`flac`/`pyin` for its IPC commands.
      - name: cargo build --no-default-features (core)
        run: cargo build -p neural-pitch-core --no-default-features
      - name: cargo clippy --no-default-features (core)
        run: cargo clippy -p neural-pitch-core --all-targets --no-default-features -- -D warnings

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: npm typecheck
        run: npm run typecheck
      - name: tsc -p tests/e2e
        run: npx tsc -p tests/e2e/tsconfig.json

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: npm run lint
        run: npm run lint

  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    env:
      # Override rust-toolchain.toml so the matrix actually exercises
      # stable + beta (rather than being silently pinned to MSRV by
      # the toolchain file).
      RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Install Tauri Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev pkg-config libasound2-dev
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Build frontend (Tauri requires dist/ for generate_context!)
        run: npm run build
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.toolchain }}
      - name: cargo test
        run: cargo test --workspace --all-features

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev pkg-config libasound2-dev
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Build frontend (Tauri requires dist/ for generate_context!)
        run: npm run build
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --workspace

  voice-acceptance:
    # §13.2 acceptance floor (aggregate >= 0.95) — release gate, runs
    # the same harness the local pre-push gate does. CI is
    # authoritative here; the local step is a fast-fail mirror so
    # contributors discover regressions before push, not after.
    name: voice-acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install ALSA + Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Run acceptance harness
        run: bash scripts/run-acceptance.sh

  e2e-mock:
    name: e2e-mock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Run Playwright E2E (Chromium + WebKit)
        run: npx playwright test --project=chromium --project=webkit
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  no-leak:
    # Hard-rule gate: every tracked file must be free of internal
    # references and personal-machine paths. The local pre-push gate
    # (scripts/ci-local.sh) runs the same check, but a contributor
    # who pushes with --no-verify (or a fork PR with hooks not
    # installed) would otherwise bypass it. CI is authoritative.
    name: no-leak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: no-leak grep
        shell: bash
        run: |
          set -euo pipefail
          # The pattern below intentionally contains the very
          # substrings it forbids; tag this script and the harness
          # with the literal sentinel `# no-leak: regex-source` and
          # filter those tagged lines out of the input.
          PATTERN='amazon|amzn|asbx|midway|brazil|claude|/home/ANT' # no-leak: regex-source
          hits="$(git ls-files \
            | xargs grep -InE "${PATTERN}" 2>/dev/null \
            | grep -vE '# no-leak: regex-source' \
            | cut -d: -f1 \
            | sort -u || true)"
          if [ -n "${hits}" ]; then
            echo "::error::no-leak grep found forbidden references in:"
            echo "${hits}"
            exit 1
          fi
          echo "no-leak: clean"
